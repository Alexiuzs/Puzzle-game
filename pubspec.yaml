name: word_puzzle

description: A language-agnostic word puzzle game inspired by Spelling Bee.

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.0
  shared_preferences: ^2.0.0
  intl: ^0.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/alphabet.txt
    - assets/words.txt
    - assets/wordlists/wolof_words.txt
